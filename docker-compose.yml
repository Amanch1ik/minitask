services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-minitask}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-minitask}
      POSTGRES_DB: ${POSTGRES_DB:-minitask}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-minitask}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5433:5432"

  api:
    build: ./api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-minitask}:${POSTGRES_PASSWORD:-minitask}@db:5432/${POSTGRES_DB:-minitask}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_ALG: ${JWT_ALG:-HS256}
      ACCESS_TOKEN_TTL_MIN: ${ACCESS_TOKEN_TTL_MIN:-43200}
      COOKIE_NAME: ${COOKIE_NAME:-minitask_session}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "8000:8000"
    # Apply migrations, then run uvicorn. Dev-only --reload would mount a volume; omitted here for a clean image.
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  pgdata:
